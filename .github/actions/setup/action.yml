---
name: Setup environment
description: Sets up development environment

runs:
  using: composite
  steps:
    - name: Setup | Backend | Restore uv cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: /tmp/.uv-cache
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          uv-${{ runner.os }}

    - name: Setup | Frontend | Restore pnpm cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/pnpm
        key: pnpm-${{ runner.os }}-${{ hashFiles('ui/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-${{ hashFiles('ui/pnpm-lock.yaml') }}
          pnpm-${{ runner.os }}

    - name: Setup | Mise-en-place
      uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      with:
        # version: "latest"  # [default: latest] mise version to install
        install: true # [default: true] run `mise install`
        cache: true # [default: true] cache mise using GitHub's cache
        experimental: true # [default: false] enable experimental features
