---
services:
  api:
    image: "${DOCKER_REGISTRY?Variable not set}/${DOCKER_IMAGE_BACKEND?Variable not set}:${NEW_VERSION-latest}"
    logging:
      driver: json-file
      options:
        max-size: 200k
        max-file: "3"
    environment:
      - SERVER_NAME=${DOMAIN?Variable not set}
      - SERVER_HOST=https://${DOMAIN?Variable not set}
      - BACKEND_MONGO_HOST=mongodb
      - BACKEND_REPOSITORY=mongodb
      # Allow explicit env var override for tests
      # - SMTP_HOST=${SMTP_HOST}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_APP_MODULE: ${BACKEND_APP_MODULE-app.main:app}
        BACKEND_PRE_START_PATH: ${BACKEND_PRE_START_PATH-/app/prestart.sh}
        BACKEND_PROCESS_MANAGER: ${BACKEND_PROCESS_MANAGER-gunicorn}
        BACKEND_WITH_RELOAD: ${BACKEND_WITH_RELOAD-false}
        INSTALL_DEV: ${INSTALL_DEV-false}
    command: uv run fastapi run src/api
    profiles:
      - backend
      - api
      - ci
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=8000

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls=true

  workers:
    image: "${DOCKER_REGISTRY?Variable not set}/${DOCKER_IMAGE_BACKEND?Variable not set}:${NEW_VERSION-latest}"
    logging:
      driver: json-file
      options:
        max-size: 200k
        max-file: "3"
    environment:
      - SERVER_NAME=${DOMAIN?Variable not set}
      - SERVER_HOST=https://${DOMAIN?Variable not set}
      - BACKEND_REPOSITORY=mongodb
      - BACKEND_MONGO_HOST=mongodb
      - BACKEND_BROKER_HOST=rabbitmq
      # Allow explicit env var override for tests
      # - SMTP_HOST=${SMTP_HOST}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_APP_MODULE: ${BACKEND_APP_MODULE-app.main:app}
        BACKEND_PRE_START_PATH: ${BACKEND_PRE_START_PATH-/app/prestart.sh}
        BACKEND_PROCESS_MANAGER: ${BACKEND_PROCESS_MANAGER-gunicorn}
        BACKEND_WITH_RELOAD: ${BACKEND_WITH_RELOAD-false}
        INSTALL_DEV: ${INSTALL_DEV-false}
    command: uv run celery -A workers worker -l INFO
    # volumes:
    # - ./backend:/app
    depends_on:
      - mongodb
      - rabbitmq
    profiles:
      - backend
      - worker
      - ci

  frontend:
    image: "${DOCKER_REGISTRY?Variable not set}/${DOCKER_IMAGE_FRONTEND?Variable not set}:${NEW_VERSION-latest}"
    environment:
      - VITE_API_ENDPOINT=http://api:8000
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - 8080:8080
    profiles:
      - frontend
      - ci
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=80

      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.rule=Host(`app.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.rule=Host(`app.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls=true

  mongodb:
    image: mongo
    ports:
      - 27017:27017
    # command: ["mongod", "--logpath", "/dev/null"] # Reduces logging verbosity
    volumes:
      - app_data:/data/db
    profiles:
      - backend
      - infra
      - ci

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - 5672:5672 # amqp port
      - 15672:15672 # Management port
    profiles:
      - backend
      - infra
      - ci

  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v5
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - TINYAUTH_APPURL=https://tinyauth.${DOMAIN?Variable not set}
      - TINYAUTH_OAUTH_PROVIDERS_GITHUB_CLIENTID=${OAUTH2_GITHUB_CLIENT_ID?Variable not set}
      - TINYAUTH_OAUTH_PROVIDERS_GITHUB_CLIENTSECRET=${OAUTH2_GITHUB_CLIENT_SECRET?Variable not set}
      - TINYAUTH_OIDC_CLIENTS_FMV-DEMO_CLIENTID=${OIDC_CLIENT_ID}
      - TINYAUTH_OIDC_CLIENTS_FMV-DEMO_CLIENTSECRET=${OIDC_CLIENT_SECRET}
      - TINYAUTH_OIDC_CLIENTS_FMV-DEMO_NAME=Fmv-demo
    profiles:
      - backend
      - infra
      - ci
    volumes:
      - ./data:/data
    labels:
      traefik.enable: true
      traefik.http.routers.tinyauth.rule: Host(`tinyauth.${DOMAIN?Variable not set}`)
      traefik.http.middlewares.tinyauth.forwardauth.address: http://tinyauth:3000/api/auth/traefik

volumes:
  app_data:
