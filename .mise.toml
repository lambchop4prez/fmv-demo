[env]
PROJECT_NAME = "FastAPI MongoDB Vue Stack Demo"
DOMAIN = "localhost"
STACK_NAME = "fmv-demo"

DOCKER_REGISTRY = "ghcr.io"
DOCKER_IMAGE_BACKEND = "lambchop4prez/fmv-demo-backend"
DOCKER_IMAGE_FRONTEND = "lambchop4prez/fmv-demo-frontend"

BACKEND_REPOSITORY = "mongodb"
# BACKEND_REPOSITORY=inmemory
BACKEND_MONGO_HOST = "localhost"
BACKEND_MONGO_DATABASE = "robot"
BACKEND_BROKER_HOST = "localhost"

CORS_ALLOW_ORIGINS = '["http://localhost:8000", "http://localhost:5173"]'

FRONTEND_API_BASE_URL = "http://localhost:8000"
VITE_API_ENDPOINT = "http://localhost:8000/api/v1"

_.file = ["{{config_root}}/.secrets.env"]

[tools]
"python" = "3.14.3"
"aqua:evilmartians/lefthook" = "2.1.4"
"aqua:astral-sh/uv" = "0.11.0"
"aqua:casey/just" = "1.47.1"
"aqua:charmbracelet/gum" = "0.17.0"
"aqua:rhysd/actionlint" = "1.7.11"
"aqua:pnpm/pnpm" = "10.32.1"
"pipx:python-semantic-release" = "10.5.3"
"aqua:gitleaks/gitleaks" = "8.30.0"
"aqua:crate-ci/typos" = "1.44.0"
jq = "1.8.1"
